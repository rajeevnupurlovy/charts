<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Multi-Indicator Dashboard</title>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root {
            --bg-color: #0c1017;
            --card-color: #161b22;
            --accent-color: #2f81f7;
            --text-color: #f0f6fc;
            --danger-color: #f85149;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        #lock-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #070a0e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .lock-box {
            background: var(--card-color);
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #30363d;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        input {
            background: var(--bg-color);
            border: 1px solid #30363d;
            color: white;
            padding: 10px;
            border-radius: 4px;
            margin-top: 15px;
            text-align: center;
        }

        button {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            margin-top: 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { background: #1f6feb; }

        header {
            background-color: var(--card-color);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #30363d;
        }

        .logo { font-size: 1.2rem; font-weight: bold; color: var(--accent-color); }
        
        .controls { display: flex; gap: 15px; align-items: center; }
        .nav-tabs { display: flex; gap: 8px; }
        
        .tab-btn {
            background: #21262d;
            color: var(--text-color);
            border: 1px solid #30363d;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
        }

        .tab-btn.active {
            background: var(--accent-color);
            border-color: var(--accent-color);
        }

        #master-symbol-selector {
            background: #21262d;
            color: white;
            border: 1px solid #30363d;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .container {
            flex: 1;
            display: flex;
            padding: 15px;
            gap: 15px;
            box-sizing: border-box;
        }

        .chart-box {
            flex: 1;
            background: var(--card-color);
            border: 1px solid #30363d;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .chart-header {
            background: #1f242c;
            padding: 8px 15px;
            font-size: 0.9rem;
            font-weight: 500;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
        }

        .chart-container-div {
            flex: 1;
            width: 100%;
            height: 100%;
        }

        #error-msg { color: var(--danger-color); margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="lock-box">
            <h2>🔒 Device Verification Required</h2>
            <p>This system is locked to this authorized hardware environment.</p>
            <input type="password" id="key-input" placeholder="Enter Secret Key">
            <br>
            <button onclick="verifyAndActivate()">Activate This Laptop</button>
            <p id="error-msg">Invalid Activation Key!</p>
        </div>
    </div>

    <header>
        <div class="logo">🎯 AlphaScalp Master Sync Dashboard</div>
        <div class="controls">
            <label for="master-symbol-selector" style="font-size:0.9rem; color:#8b949e;">Global Symbol Sync:</label>
            <select id="master-symbol-selector" onchange="changeGlobalSymbol(this.value)">
                <option value="NSE:NIFTY">NIFTY 50</option>
                <option value="NSE:BANKNIFTY">BANK NIFTY</option>
                <option value="NSE:CNXFINANCE">FIN NIFTY</option>
                <option value="NSE:RELIANCE">RELIANCE</option>
                <option value="NSE:HDFCBANK">HDFC BANK</option>
            </select>

            <div class="nav-tabs">
                <button class="tab-btn active" onclick="switchLayout('dual')">Dual Split View</button>
                <button class="tab-btn" onclick="switchLayout('single1')">Indicator 1</button>
                <button class="tab-btn" onclick="switchLayout('single2')">Indicator 2</button>
                <button class="tab-btn" onclick="switchLayout('single3')">Indicator 3</button>
                <button class="tab-btn" onclick="switchLayout('single4')">Indicator 4</button>
                <button class="tab-btn" onclick="switchLayout('single5')">Indicator 5</button>
            </div>
        </div>
    </header>

    <div class="container" id="dashboard-container">
        <div class="chart-box" id="box-1"><div class="chart-header">📊 Indicator Set 1 <span id="sym-lbl-1">(NIFTY)</span></div><div id="tv-chart-1" class="chart-container-div"></div></div>
        <div class="chart-box" id="box-2"><div class="chart-header">📈 Indicator Set 2 <span id="sym-lbl-2">(NIFTY)</span></div><div id="tv-chart-2" class="chart-container-div"></div></div>
        <div class="chart-box" id="box-3" style="display:none;"><div class="chart-header">🎯 Indicator Set 3 <span id="sym-lbl-3">(NIFTY)</span></div><div id="tv-chart-3" class="chart-container-div"></div></div>
        <div class="chart-box" id="box-4" style="display:none;"><div class="chart-header">⚡ Indicator Set 4 <span id="sym-lbl-4">(NIFTY)</span></div><div id="tv-chart-4" class="chart-container-div"></div></div>
        <div class="chart-box" id="box-5" style="display:none;"><div class="chart-header">💎 Indicator Set 5 <span id="sym-lbl-5">(NIFTY)</span></div><div id="tv-chart-5" class="chart-container-div"></div></div>
    </div>

    <script>
        const MASTER_ACTIVATION_KEY = "MySecretAdmin99#"; 
        let currentSymbol = "NSE:NIFTY";
        let widgets = {};

        // Security Authentication Process
        window.onload = function() {
            if (localStorage.getItem("device_secure_identity_token") === "X978-B231-LL92-MM10") {
                document.getElementById('lock-screen').style.display = 'none';
                initAllCharts();
            }
        };

        function verifyAndActivate() {
            if (document.getElementById('key-input').value === MASTER_ACTIVATION_KEY) {
                localStorage.setItem("device_secure_identity_token", "X978-B231-LL92-MM10");
                document.getElementById('lock-screen').style.display = 'none';
                initAllCharts();
            } else {
                document.getElementById('error-msg').style.display = 'block';
                setTimeout(() => { document.getElementById('error-msg').style.display = 'none'; }, 2000);
            }
        }

        // Initialize Native High-Performance TradingView Objects
        function buildWidget(containerId, widgetKey) {
            widgets[widgetKey] = new TradingView.widget({
                "autosize": true,
                "symbol": currentSymbol,
                "interval": "5",
                "timezone": "Asia/Kolkata",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "toolbar_bg": "#f1f3f6",
                "enable_publishing": false,
                "hide_side_toolbar": false,
                "allow_symbol_change": true,
                "container_id": containerId
            });
        }

        function initAllCharts() {
            buildWidget("tv-chart-1", "w1");
            buildWidget("tv-chart-2", "w2");
            buildWidget("tv-chart-3", "w3");
            buildWidget("tv-chart-4", "w4");
            buildWidget("tv-chart-5", "w5");
        }

        // AUTOMATIC GLOBAL SYMBOL SYNC FUNCTION
        function changeGlobalSymbol(newSymbol) {
            currentSymbol = newSymbol;
            const shortName = newSymbol.split(":")[1];
            
            // Instantly updates ticker symbol fields across all charts simultaneously
            for (let i = 1; i <= 5; i++) {
                document.getElementById(`sym-lbl-${i}`).innerText = `(${shortName})`;
            }
            
            if(widgets.w1) widgets.w1.chart().setSymbol(newSymbol);
            if(widgets.w2) widgets.w2.chart().setSymbol(newSymbol);
            if(widgets.w3) widgets.w3.chart().setSymbol(newSymbol);
            if(widgets.w4) widgets.w4.chart().setSymbol(newSymbol);
            if(widgets.w5) widgets.w5.chart().setSymbol(newSymbol);
        }

        // Tabs layout manager
        function switchLayout(mode) {
            const allBoxes = [document.getElementById('box-1'), document.getElementById('box-2'), document.getElementById('box-3'), document.getElementById('box-4'), document.getElementById('box-5')];
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            if(event) event.target.classList.add('active');

            if (mode === 'dual') {
                allBoxes.forEach(box => box.style.display = 'none');
                allBoxes[0].style.display = 'flex';
                allBoxes[1].style.display = 'flex';
            } else {
                allBoxes.forEach(box => box.style.display = 'none');
                if (mode === 'single1') allBoxes[0].style.display = 'flex';
                if (mode === 'single2') allBoxes[1].style.display = 'flex';
                if (mode === 'single3') allBoxes[2].style.display = 'flex';
                if (mode === 'single4') allBoxes[3].style.display = 'flex';
                if (mode === 'single5') allBoxes[4].style.display = 'flex';
            }
        }
    </script>
</body>
</html>
